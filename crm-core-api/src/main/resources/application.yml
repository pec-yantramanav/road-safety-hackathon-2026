spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/roadwatch
    username: roadwatch
    password: dev123
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.spatial.dialect.postgis.PostgisPG10Dialect
        show_sql: false
        format_sql: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://keycloak:8080/realms/roadwatch
          jwk-set-uri: http://keycloak:8080/realms/roadwatch/protocol/openid-connect/certs

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true

roadwatch:
  ai-service-url: http://crm-ai-service:8101
  escalation:
    chain: {JE: AE, AE: EE, EE: SE, SE: CE}
    sla-hours: {JE: 72, AE: 120, EE: 168, SE: 336}
